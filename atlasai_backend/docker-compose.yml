version: "3.9"

services:
  api:
    build: .
    container_name: atlasai_api
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8001
    depends_on:
      - chromadb
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: atlasai_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  chroma_data:
